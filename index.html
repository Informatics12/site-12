<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT Teacher Interactive</title>
    <style>
        :root {
            --primary: #6366f1;
            --accent: #a855f7;
            --bg-gradient: linear-gradient(-45deg, #0f172a, #1e1b4b, #312e81);
            --glass: rgba(255, 255, 255, 0.05);
        }

        /* Хакерська тема */
        body.matrix-mode {
            --primary: #00ff41;
            --accent: #008f11;
            --bg-gradient: linear-gradient(-45deg, #000, #051a05, #000);
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg-gradient);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            transition: background 0.5s ease;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            text-align: center;
        }

        /* Перемикач теми */
        .theme-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            cursor: pointer;
            font-size: 1.5rem;
            background: var(--glass);
            padding: 10px;
            border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.2);
            transition: 0.3s;
        }

        .theme-toggle:hover { transform: rotate(20deg) scale(1.1); }

        /* Блок цитати */
        .quote-container {
            min-height: 120px;
            margin-bottom: 30px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        #quote-text {
            font-size: 1.4rem;
            font-style: italic;
            transition: opacity 0.5s ease;
        }

        .btn-refresh {
            background: none;
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 8px 20px;
            border-radius: 20px;
            cursor: pointer;
            margin-top: 15px;
            transition: 0.3s;
        }

        .btn-refresh:hover {
            background: var(--primary);
            color: white;
        }

        /* Картки-перевертні */
        .tips-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin: 40px 0;
        }

        .flip-card {
            height: 100px;
            perspective: 1000px;
            cursor: pointer;
        }

        .flip-card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.6s;
            transform-style: preserve-3d;
        }

        .flip-card:hover .flip-card-inner { transform: rotateY(180deg); }

        .flip-front, .flip-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.1);
            font-weight: bold;
        }

        .flip-front { background: rgba(255,255,255,0.05); }
        .flip-back {
            background: var(--primary);
            transform: rotateY(180deg);
            padding: 10px;
            font-size: 0.8rem;
        }

        .diary-btn {
            display: inline-block;
            padding: 18px 40px;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            transition: 0.3s;
        }

        .diary-btn:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(99, 102, 241, 0.4); }
    </style>
</head>
<body>

    <div class="theme-toggle" onclick="toggleTheme()" title="Змінити тему">⚙️</div>

    <div class="container">
        <div class="quote-container">
            <p id="quote-text">"Код — це поезія, написана на мові логіки."</p>
            <button class="btn-refresh" onclick="newQuote()">Ще цитату ↻</button>
        </div>

        <div class="tips-grid">
            <div class="flip-card">
                <div class="flip-card-inner">
                    <div class="flip-front">Порада №1</div>
                    <div class="flip-back">Ctrl+S — твій найкращий друг під час роботи!</div>
                </div>
            </div>
            <div class="flip-card">
                <div class="flip-card-inner">
                    <div class="flip-front">Порада №2</div>
                    <div class="flip-back">Не бійся помилок, бійся не знати як їх виправити.</div>
                </div>
            </div>
            <div class="flip-card">
                <div class="flip-card-inner">
                    <div class="flip-front">Порада №3</div>
                    <div class="flip-back">Чистий код — це коли колеги не хочуть тебе вбити.</div>
                </div>
            </div>
        </div>

        <a href="https://mriia.gov.ua/app" class="diary-btn">📅 Відкрити Електронний Щоденник</a>
    </div>

    <script>
        const quotes = [
            "Майбутнє залежить від того, що ви робите сьогодні. — Махатма Ганді",
            "Програмне забезпечення — це поєднання мистецтва та інженерії. — Білл Гейтс",
            "Програмування — це не те, що ви знаєте, а те, що ви можете з'ясувати. — Кріс Пайн",
            "Алгоритми — це просто рецепти для комп'ютера. — Хтось розумний",
            "Інформатика — це не про комп'ютери, а про вирішення проблем."
        ];

        function newQuote() {
            const qText = document.getElementById('quote-text');
            qText.style.opacity = 0;
            setTimeout(() => {
                const randomQuote = quotes[Math.floor(Math.random() * quotes.length)];
                qText.innerText = `"${randomQuote}"`;
                qText.style.opacity = 1;
            }, 500);
        }

        function toggleTheme() {
            document.body.classList.toggle('matrix-mode');
        }
    </script>
</body>
</html>
